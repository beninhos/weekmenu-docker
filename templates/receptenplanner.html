{% extends "base.html" %}
{% block content %}

<style>
  /* View containers – only one visible at a time */
  #view-grid      { display: none; }
  #view-coverflow { display: none; }
  #view-list      { display: none; }

  /* ── Grid cards ───────────────────────────────────────── */
  .recipe-card-grid {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 0.75rem;
    background: #F5F2ED;
    aspect-ratio: 3 / 4;
  }
  .recipe-card-grid img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
    display: block;
  }
  .recipe-card-grid:hover img { transform: scale(1.06); }
  .recipe-card-grid .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.10) 55%, transparent 100%);
    display: flex; flex-direction: column;
    justify-content: flex-end;
    padding: 0.65rem;
  }
  .recipe-card-grid .card-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Coverflow ────────────────────────────────────────── */
  #coverflow-outer {
    position: relative;
    padding: 0 3rem;
  }
  #coverflow-track {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 340px;
    position: relative;
    perspective: 1000px;
    overflow: hidden;
  }
  .coverflow-card {
    position: absolute;
    width: 210px;
    height: 290px;
    border-radius: 0.75rem;
    overflow: hidden;
    cursor: pointer;
    background: #F5F2ED;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                opacity 0.4s ease,
                box-shadow 0.4s ease;
    will-change: transform, opacity;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .coverflow-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .coverflow-card .cf-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .coverflow-card .cf-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    color: white;
    padding: 0.5rem 0.6rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 600;
    line-height: 1.2;
    display: none;
  }
  /* Positions */
  .cf-pos-0  { transform: translateX(0)      rotateY(0deg)    scale(1);    opacity: 1;    z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .cf-pos-1  { transform: translateX(260px)  rotateY(-40deg)  scale(0.82); opacity: 0.80; z-index: 8;  }
  .cf-pos-m1 { transform: translateX(-260px) rotateY(40deg)   scale(0.82); opacity: 0.80; z-index: 8;  }
  .cf-pos-2  { transform: translateX(440px)  rotateY(-55deg)  scale(0.65); opacity: 0.50; z-index: 6;  }
  .cf-pos-m2 { transform: translateX(-440px) rotateY(55deg)   scale(0.65); opacity: 0.50; z-index: 6;  }
  .cf-pos-hidden      { transform: translateX(650px)  rotateY(-70deg) scale(0.5); opacity: 0; z-index: 1; pointer-events: none; }
  .cf-pos-hidden-left { transform: translateX(-650px) rotateY(70deg)  scale(0.5); opacity: 0; z-index: 1; pointer-events: none; }

  /* ── Plan popup ────────────────────────────────────────── */
  #plan-popup {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #plan-popup.open { display: flex; }

  /* ── Toast ─────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: #2C2C2C;
    color: white;
    padding: 0.75rem 1.25rem;
    border-radius: 0.5rem;
    font-weight: 600;
    font-size: 0.875rem;
    z-index: 300;
    opacity: 0;
    transform: translateY(0.75rem);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* View toggle button active state */
  .view-btn { transition: background-color 0.15s, color 0.15s; }
  .view-btn.active { background-color: #8B4513; color: white; }
</style>

<!-- ── Page header ─────────────────────────────────────────── -->
<div class="flex flex-wrap justify-between items-center mb-5 gap-3">
  <h1 class="text-2xl font-extrabold tracking-tight text-[#2C2C2C]">Receptenplanner</h1>
  <div class="flex gap-1 bg-[#F5F2ED] p-1 rounded-lg">
    <button id="btn-grid" class="view-btn px-3 py-1.5 text-sm font-medium rounded-md text-[#6B6B6B]" onclick="switchView('grid')" title="Kaartjes">
      <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      Grid
    </button>
    <button id="btn-coverflow" class="view-btn px-3 py-1.5 text-sm font-medium rounded-md text-[#6B6B6B]" onclick="switchView('coverflow')" title="Cover flow">
      <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4"/></svg>
      Cover
    </button>
    <button id="btn-list" class="view-btn px-3 py-1.5 text-sm font-medium rounded-md text-[#6B6B6B]" onclick="switchView('list')" title="Lijst">
      <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      Lijst
    </button>
  </div>
</div>

<!-- ── Search bar + kookboekfilter + nieuw recept ─────────── -->
<div class="filter-row flex flex-wrap gap-2 mb-5 items-center">
  <input type="text" id="recipe-search"
         placeholder="Zoek op naam of kookboek..."
         oninput="applyFilters()"
         class="border border-[#D4CEC4] rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882]"
         style="min-width:220px; flex:1 1 220px; max-width:380px;">
  <select id="cookbook-filter" onchange="filterByCookbook(this.value)"
          class="border border-[#D4CEC4] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882] bg-white">
    <option value="">Alle kookboeken</option>
  </select>
  <a href="{{ url_for('recipes.new_recipe') }}"
     class="inline-flex items-center gap-1.5 bg-[#2C2C2C] hover:bg-[#1a1a1a] text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors ml-auto"
     style="text-decoration:none;">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Nieuw recept
  </a>
</div>

<!-- ── VIEW: GRID ─────────────────────────────────────────── -->
<div id="view-grid"
     style="display:none; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem;">
</div>

<!-- ── VIEW: COVERFLOW ───────────────────────────────────── -->
<div id="view-coverflow" style="display:none;">
  <div id="coverflow-outer">
    <button onclick="coverflowPrev()"
            class="absolute left-0 top-1/2 -translate-y-1/2 z-20 bg-white rounded-full shadow-md w-10 h-10 flex items-center justify-center text-[#6B6B6B] hover:text-[#2C2C2C] hover:shadow-lg transition-shadow"
            style="transform: translateY(-50%);">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <button onclick="coverflowNext()"
            class="absolute right-0 top-1/2 -translate-y-1/2 z-20 bg-white rounded-full shadow-md w-10 h-10 flex items-center justify-center text-[#6B6B6B] hover:text-[#2C2C2C] hover:shadow-lg transition-shadow"
            style="transform: translateY(-50%);">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>
    <div id="coverflow-track"></div>
  </div>
  <div class="text-center mt-5">
    <p id="cf-title" class="text-lg font-bold text-[#2C2C2C]"></p>
    <p id="cf-sub"   class="text-sm text-[#6B6B6B] mt-0.5"></p>
    <button onclick="openDetail(null, cfIndex >= 0 && filteredRecipes[cfIndex] ? filteredRecipes[cfIndex].id : null)"
            class="mt-3 text-sm text-[#8B4513] hover:underline font-medium">
      Details &amp; plannen →
    </button>
  </div>
  <p class="text-center text-xs text-[#6B6B6B] mt-2">Gebruik pijltjestoetsen of klik de pijlen</p>
</div>

<!-- ── VIEW: LIJST ───────────────────────────────────────── -->
<div id="view-list" style="display:none;" class="space-y-2">
</div>

<!-- ── DETAIL PANEL ──────────────────────────────────────── -->
{% include '_recipe_detail_modal.html' %}

<!-- ── PLAN POPUP ─────────────────────────────────────────── -->
<div id="plan-popup">
  <div class="bg-[#FAF8F5] rounded-xl border border-[#E8E4DC] p-6 w-full mx-4" style="max-width:380px;">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-[#2C2C2C]">Recept plannen</h3>
      <button onclick="closePlanPopup()" class="text-[#6B6B6B] hover:text-[#6B6B6B] text-2xl leading-none">&times;</button>
    </div>

    <p class="text-sm text-[#6B6B6B] mb-4">
      <span id="popup-recipe-name" class="font-semibold text-[#2C2C2C]"></span>
    </p>

    <div class="space-y-3 mb-5">
      <div>
        <label class="block text-sm font-medium text-[#2C2C2C] mb-1">Week</label>
        <input type="number" id="popup-week" min="1" max="53"
               oninput="updateWeekRange()"
               class="w-28 border border-[#D4CEC4] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882]">
        <p id="popup-week-range" class="text-xs text-[#6B6B6B] mt-1"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2C2C2C] mb-1">Dag</label>
        <select id="popup-day" class="w-full border border-[#D4CEC4] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882]">
          <option value="0">Maandag</option>
          <option value="1">Dinsdag</option>
          <option value="2">Woensdag</option>
          <option value="3">Donderdag</option>
          <option value="4">Vrijdag</option>
          <option value="5">Zaterdag</option>
          <option value="6">Zondag</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2C2C2C] mb-1">Maaltijd</label>
        <select id="popup-meal" class="w-full border border-[#D4CEC4] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882]">
          <option value="ontbijt">Ontbijt</option>
          <option value="lunch">Lunch</option>
          <option value="diner" selected>Diner</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2C2C2C] mb-1">Personen</label>
        <input type="number" id="popup-persons" min="1" max="20" value="4"
               class="w-28 border border-[#D4CEC4] rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#C9A882]">
      </div>
    </div>

    <button id="popup-confirm-btn" onclick="confirmPlanning()"
            class="w-full bg-[#2C2C2C] hover:bg-[#1a1a1a] text-white font-bold py-3 rounded-lg transition-colors">
      Bevestigen
    </button>
    <p id="popup-error" class="text-red-500 text-sm mt-2" style="display:none;"></p>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────── -->
<div id="toast"></div>

<script type="application/json" id="planner-recipes">{{ recipes_json | safe }}</script>
<script type="application/json" id="planner-config">{{ {'current_week': current_week, 'current_year': current_year, 'default_serves': default_serves} | tojson }}</script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="{{ url_for('static', filename='js/recipe-detail-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/receptenplanner.js') }}"></script>

{% endblock %}

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekmenu Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Pagina-titels */
        h1.page-title,
        h2.page-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: #111827;
            line-height: 1.2;
        }

        /* Sectie-headers */
        h3.section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #374151;
        }

        /* Subtitel / beschrijving */
        .page-subtitle {
            font-size: 0.875rem;
            font-weight: 400;
            color: #6b7280;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="group">
                <span class="text-lg font-bold tracking-tight group-hover:opacity-80 transition-opacity">Weekmenu Planner</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="{{ url_for('index') }}" class="text-sm font-medium hover:text-blue-100 transition-colors">Home</a>
                <a href="{{ url_for('receptenplanner') }}" class="text-sm font-medium hover:text-blue-100 transition-colors">Planner</a>
                <a href="{{ url_for('recipes') }}" class="text-sm font-medium hover:text-blue-100 transition-colors">Recepten</a>
                <a href="{{ url_for('list_cookbooks') }}" class="text-sm font-medium hover:text-blue-100 transition-colors">Kookboeken</a>
                <a href="{{ url_for('settings') }}" class="text-sm font-medium hover:text-blue-100 transition-colors">Instellingen</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-4 mt-2">
        {% block content %}{% endblock %}
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekmenu Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon-192.png') }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='icon-512.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <meta name="theme-color" content="#8B4513">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <style>
        :root {
            --color-ink:         #2C2C2C;
            --color-pencil:      #6B6B6B;
            --color-sepia:       #8B4513;
            --color-sepia-light: #C9A882;
            --color-sepia-bg:    #FDF8F3;
            --color-linen:       #D4CEC4;
            --color-paper:       #FAF8F5;
            --color-card:        #F5F2ED;
            --color-border:      #E8E4DC;
            --font-serif: 'Libre Baskerville', Georgia, serif;
            --font-sans:  'Inter', system-ui, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--color-paper);
            color: var(--color-ink);
            -webkit-font-smoothing: antialiased;
        }

        h1.page-title, .page-title {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--color-ink);
        }

        h2.section-title, .section-title {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            font-style: italic;
            font-weight: 400;
            color: var(--color-ink);
        }

        .meta   { font-size: 0.75rem; color: var(--color-pencil); }
        .accent { color: var(--color-sepia); }

        a { color: var(--color-sepia); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .dashed-line { border-bottom: 1px dashed var(--color-linen); }

        .card {
            background: var(--color-paper);
            border: 0.5px solid var(--color-border);
            border-radius: 8px;
        }

        .btn-primary {
            background: var(--color-ink);
            color: var(--color-paper);
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary:hover { background: #1a1a1a; }

        .btn-secondary {
            background: transparent;
            color: var(--color-ink);
            border: 1px solid var(--color-linen);
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .btn-secondary:hover { background: var(--color-card); }

        .btn-accent {
            background: transparent;
            color: var(--color-sepia);
            border: 1px solid var(--color-sepia-light);
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
        }
        .btn-accent:hover { background: var(--color-sepia-bg); }

        input[type="text"],
        input[type="search"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            background: #FFFFFF;
            border: 1px solid var(--color-linen);
            padding: 0.625rem 0.875rem;
            border-radius: 6px;
            font-size: 0.875rem;
            color: var(--color-ink);
            font-family: var(--font-sans);
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--color-sepia-light);
        }

        .favorite { color: var(--color-sepia); }

        /* Navigatie */
        .nav-link {
            color: var(--color-pencil);
            text-decoration: none;
            padding-bottom: 2px;
        }
        .nav-link:hover {
            color: var(--color-ink);
            text-decoration: none;
        }
        .nav-active {
            color: var(--color-sepia);
            border-bottom: 1px solid var(--color-sepia);
            padding-bottom: 2px;
            text-decoration: none;
        }
        .nav-active:hover { text-decoration: none; }

        /* Week-pagina dag-stijlen */
        .day-filled, .day-empty { background: var(--color-paper); }
        .day-today { border-left: 2px solid var(--color-sepia); }
        .recipe-slot {
            background: var(--color-card);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
        }
        .recipe-favorite::after {
            content: "★";
            color: var(--color-sepia);
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <nav style="background: var(--color-paper); border-bottom: 1px solid var(--color-border);">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="{{ url_for('main.index') }}" style="text-decoration:none;" class="flex items-center gap-2">
                <img src="{{ url_for('static', filename='favicon-light.svg') }}" alt="" style="width:28px;height:28px;border-radius:6px;">
                <span style="font-family: var(--font-serif); font-size: 1.25rem; color: var(--color-ink); letter-spacing: -0.02em;">Weekmenu</span>
            </a>

            <div class="hidden md:flex items-center gap-6">
                <a href="{{ url_for('recipes.receptenplanner') }}"
                   class="text-sm {% if request.endpoint == 'recipes.receptenplanner' %}nav-active{% else %}nav-link{% endif %}">Receptenplanner</a>
                <a href="{{ url_for('main.boodschappenlijst_redirect') }}"
                   class="text-sm {% if request.endpoint == 'main.boodschappenlijst_redirect' %}nav-active{% else %}nav-link{% endif %}">Boodschappen</a>
            </div>

            <div class="flex items-center gap-4">
                <a href="{{ url_for('settings.settings_page') }}"
                   class="w-8 h-8 flex items-center justify-center rounded-md border"
                   style="border-color: var(--color-linen); text-decoration:none;">
                    <svg class="w-4 h-4" fill="currentColor" style="color: var(--color-pencil);" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-2">
        {% block content %}{% endblock %}
    </main>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');</script>
</body>
</html>

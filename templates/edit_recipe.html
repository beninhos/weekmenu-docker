{% extends "base.html" %}
{% block content %}
<div class="bg-[#F5F2ED] rounded-lg border border-[#E8E4DC] p-6">
    <h2 class="text-2xl font-extrabold tracking-tight text-[#2C2C2C] mb-6">Recept Bewerken</h2>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Naam</label>
            <input type="text" name="name" required value="{{ recipe.name }}"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Standaard aantal personen</label>
            <input type="number" name="serves" value="{{ recipe.serves or '' }}" min="1" max="12"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
            <p class="text-[#6B6B6B] text-xs mt-1">Standaard aantal personen waarvoor dit recept is bedoeld (optioneel)</p>
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Kookboek</label>
            <select name="cookbook" 
                    class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
                <option value="">Selecteer een kookboek</option>
                {% for cookbook in cookbooks %}
                <option value="{{ cookbook.id }}" 
                        {{ 'selected' if cookbook.id == recipe.cookbook_id }}>
                    {{ cookbook.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Pagina</label>
            <input type="number" name="page" value="{{ recipe.page or '' }}"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">URL (online recept)</label>
            <input type="url" name="url" value="{{ recipe.url or '' }}" placeholder="https://..."
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Bereidingswijze</label>
            <textarea name="instructions" rows="6" placeholder="Beschrijf de bereidingsstappen..."
                      class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">{{ recipe.instructions or '' }}</textarea>
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Receptafbeelding</label>
            {% if recipe.image_path %}
            <div class="mb-2">
                <img src="{{ url_for('static', filename=recipe.image_path.replace('static/', '')) }}" 
                     alt="{{ recipe.name }}" 
                     class="w-48 h-48 object-cover rounded">
            </div>
            {% endif %}
            <input type="file" name="image" accept="image/*"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        
        <datalist id="unit-list">
            <option value="stuks"><option value="gram"><option value="g"><option value="kg">
            <option value="ml"><option value="dl"><option value="l"><option value="el"><option value="tl">
            <option value="blik"><option value="bosje"><option value="teen"><option value="snufje">
            <option value="scheutje"><option value="plak"><option value="takje"><option value="pakje">
        </datalist>

        <div>
            <h3 class="text-sm font-semibold uppercase tracking-wide text-[#6B6B6B] mb-2">Ingrediënten</h3>
            <div id="ingredients" class="space-y-2">
                {% for ri in recipe.ingredients %}
                <div class="grid grid-cols-12 gap-2 ingredient-row">
                    <div class="col-span-4 relative">
                        <input type="text" name="ingredient[]" value="{{ ri.ingredient.display }}" autocomplete="off"
                               class="ingredient-ac block w-full rounded-md border-[#D4CEC4] shadow-sm">
                        <input type="hidden" name="ingredient_id[]" value="{{ ri.ingredient.id }}">
                        <input type="text" name="preparation[]" placeholder="Bereiding (optioneel)" value="{{ ri.preparation or '' }}"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm text-xs mt-1 py-1 text-[#6B6B6B]">
                        <div class="ac-dropdown hidden absolute z-50 w-full bg-white border border-[#E8E4DC] rounded-md shadow-lg mt-1 max-h-48 overflow-y-auto"></div>
                    </div>
                    <div class="col-span-2">
                        <input type="number" step="0.1" name="amount[]" value="{{ ri.amount }}"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                    </div>
                    <div class="col-span-2">
                        <input type="text" name="unit[]" value="{{ ri.unit }}" list="unit-list"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                    </div>
                    <div class="col-span-3">
                        <select name="category[]" class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                            {% for cat in categories %}
                            <option value="{{ cat }}" {{ 'selected' if ri.ingredient.category == cat }}>
                                {{ cat }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-span-1 flex items-center justify-center">
                        <button type="button" onclick="this.closest('.ingredient-row').remove()"
                                class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
                    </div>
                </div>
                {% endfor %}
            </div>

            <button type="button" onclick="addIngredientRow()"
                    class="mt-4 text-[#8B4513] hover:text-[#8B4513] text-sm">
                + Ingrediënt toevoegen
            </button>
        </div>
        
        <div class="flex justify-end space-x-4">
            <a href="{{ url_for('recipes') }}"
               class="border border-[#D4CEC4] text-[#2C2C2C] px-4 py-2 rounded hover:bg-[#F5F2ED]">
                Annuleren
            </a>
            <button type="submit"
                    class="bg-[#2C2C2C] text-white px-4 py-2 rounded hover:bg-[#2C2C2C]">
                Opslaan
            </button>
        </div>
    </form>
</div>

<script>
const categories = {{ categories | tojson }};
let acDebounce = null;

function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addIngredientRow(name, amount, unit, category, ingId, preparation) {
    const container = document.getElementById('ingredients');
    const row = document.createElement('div');
    row.className = 'grid grid-cols-12 gap-2 ingredient-row';
    const optionsHtml = categories.map(cat => `<option value="${esc(cat)}">${esc(cat)}</option>`).join('');
    row.innerHTML = `
        <div class="col-span-4 relative">
            <input type="text" name="ingredient[]" placeholder="Ingrediënt" value="${esc(name ?? '')}" autocomplete="off"
                   class="ingredient-ac block w-full rounded-md border-[#D4CEC4] shadow-sm">
            <input type="hidden" name="ingredient_id[]" value="${esc(ingId ?? '')}">
            <input type="text" name="preparation[]" placeholder="Bereiding (optioneel)" value="${esc(preparation ?? '')}"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm text-xs mt-1 py-1 text-[#6B6B6B]">
            <div class="ac-dropdown hidden absolute z-50 w-full bg-white border border-[#E8E4DC] rounded-md shadow-lg mt-1 max-h-48 overflow-y-auto"></div>
        </div>
        <div class="col-span-2">
            <input type="number" step="0.1" name="amount[]" placeholder="Aantal" value="${esc(amount ?? '')}"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        <div class="col-span-2">
            <input type="text" name="unit[]" placeholder="Eenheid" value="${esc(unit ?? '')}" list="unit-list"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        <div class="col-span-3">
            <select name="category[]" class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                ${optionsHtml}
            </select>
        </div>
        <div class="col-span-1 flex items-center justify-center">
            <button type="button" onclick="this.closest('.ingredient-row').remove()"
                    class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
        </div>
    `;
    if (category) {
        row.querySelector('select[name="category[]"]').value = category;
    }
    container.appendChild(row);
    initAutocomplete(row.querySelector('.ingredient-ac'));
}

/* ── Autocomplete ────────────────────────────────────────── */
function initAutocomplete(input) {
    const wrap = input.closest('.relative') || input.parentElement;
    const dropdown = wrap.querySelector('.ac-dropdown');
    const hiddenId = wrap.querySelector('input[name="ingredient_id[]"]');
    let activeIdx = -1;

    input.addEventListener('input', () => {
        hiddenId.value = '';
        const q = input.value.trim();
        clearTimeout(acDebounce);
        if (q.length < 1) { dropdown.classList.add('hidden'); return; }
        acDebounce = setTimeout(() => fetchResults(q, dropdown, input, hiddenId), 200);
    });

    input.addEventListener('keydown', (e) => {
        if (dropdown.classList.contains('hidden')) return;
        const items = dropdown.querySelectorAll('.ac-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); highlightItem(items, activeIdx); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); highlightItem(items, activeIdx); }
        else if (e.key === 'Enter' && activeIdx >= 0 && items[activeIdx]) { e.preventDefault(); items[activeIdx].click(); }
        else if (e.key === 'Escape') { dropdown.classList.add('hidden'); activeIdx = -1; }
    });

    document.addEventListener('click', (e) => {
        if (!wrap.contains(e.target)) { dropdown.classList.add('hidden'); activeIdx = -1; }
    });
}

function highlightItem(items, idx) {
    items.forEach((el, i) => {
        el.classList.toggle('bg-[#FAF8F5]', i === idx);
    });
}

async function fetchResults(q, dropdown, input, hiddenId) {
    try {
        const resp = await fetch('/api/ingredients/search?q=' + encodeURIComponent(q));
        const results = await resp.json();
        if (!results.length) {
            dropdown.innerHTML = `<div class="px-3 py-2 text-xs text-[#6B6B6B]">Geen match — wordt nieuw aangemaakt bij opslaan</div>`;
            dropdown.classList.remove('hidden');
            return;
        }
        dropdown.innerHTML = results.map((r, i) => `
            <div class="ac-item flex items-center justify-between px-3 py-1.5 cursor-pointer hover:bg-[#FAF8F5] text-sm"
                 data-id="${r.id}" data-name="${esc(r.name)}" data-cat="${esc(r.category)}">
                <span class="text-[#2C2C2C]">${esc(r.name)}</span>
                <span class="text-xs text-[#6B6B6B]">${esc(r.category)}${r.has_ah ? ' · AH' : ''}</span>
            </div>
        `).join('');
        dropdown.querySelectorAll('.ac-item').forEach(item => {
            item.addEventListener('click', () => {
                input.value = item.dataset.name;
                hiddenId.value = item.dataset.id;
                const row = input.closest('.ingredient-row');
                if (row) {
                    const catSel = row.querySelector('select[name="category[]"]');
                    if (catSel) catSel.value = item.dataset.cat;
                }
                dropdown.classList.add('hidden');
            });
        });
        dropdown.classList.remove('hidden');
    } catch (err) {
        dropdown.classList.add('hidden');
    }
}

// Initialize autocomplete on all existing rows
document.querySelectorAll('.ingredient-ac').forEach(initAutocomplete);
</script>
{% endblock %}

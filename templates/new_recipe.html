{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-2xl font-bold mb-6">Nieuw Recept</h2>

    <!-- URL Import -->
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
        <p class="text-sm font-medium text-blue-800 mb-2">Importeer via URL</p>
        <div class="flex gap-2">
            <input type="url" id="importUrl" placeholder="https://..."
                   class="flex-1 rounded-md border-gray-300 shadow-sm text-sm">
            <button type="button" onclick="importFromUrl()"
                    id="importBtn"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-sm shrink-0">
                Importeren
            </button>
        </div>
        <div id="importStatus" class="hidden mt-2 text-sm"></div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700">Naam</label>
            <input type="text" name="name" id="fieldName" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Standaard aantal personen</label>
            <input type="number" name="serves" id="fieldServes" min="1" max="12"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
            <p class="text-gray-600 text-xs mt-1">Standaard aantal personen waarvoor dit recept is bedoeld (optioneel)</p>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Kookboek</label>
            <select name="cookbook"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                <option value="">Selecteer een kookboek</option>
                {% for cookbook in cookbooks %}
                <option value="{{ cookbook.id }}">{{ cookbook.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Receptafbeelding</label>
            <input type="file" name="image" accept="image/*"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
            <input type="hidden" name="image_path_imported" id="fieldImagePath">
            <img id="importedImagePreview" src="" alt="Geïmporteerde afbeelding"
                 class="hidden mt-2 rounded max-h-40 object-cover">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Pagina</label>
            <input type="number" name="page"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">URL (online recept)</label>
            <input type="url" name="url" id="fieldUrl" placeholder="https://..."
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Bereidingswijze</label>
            <textarea name="instructions" id="fieldInstructions" rows="6" placeholder="Beschrijf de bereidingsstappen..."
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm"></textarea>
        </div>

        <div>
            <h3 class="text-lg font-medium text-gray-700 mb-2">Ingrediënten</h3>
            <div id="ingredients" class="space-y-2">
                <div class="grid grid-cols-12 gap-2">
                    <div class="col-span-4">
                        <input type="text" name="ingredient[]" placeholder="Ingrediënt"
                               class="block w-full rounded-md border-gray-300 shadow-sm">
                    </div>
                    <div class="col-span-2">
                        <input type="number" step="0.1" name="amount[]" placeholder="Aantal"
                               class="block w-full rounded-md border-gray-300 shadow-sm">
                    </div>
                    <div class="col-span-2">
                        <input type="text" name="unit[]" placeholder="Eenheid"
                               class="block w-full rounded-md border-gray-300 shadow-sm">
                    </div>
                    <div class="col-span-3">
                        <select name="category[]" class="block w-full rounded-md border-gray-300 shadow-sm">
                            <option value="AGF (Groenten & Fruit)">AGF (Groenten & Fruit)</option>
                            <option value="Vlees & Vis">Vlees & Vis</option>
                            <option value="Zuivel & Eieren">Zuivel & Eieren</option>
                            <option value="Kaas & Vleeswaren">Kaas & Vleeswaren</option>
                            <option value="Brood & Banket">Brood & Banket</option>
                            <option value="Pasta, Rijst & Wereldkeuken">Pasta, Rijst & Wereldkeuken</option>
                            <option value="Conserven & Soepen">Conserven & Soepen</option>
                            <option value="Sauzen & Kruiden">Sauzen & Kruiden</option>
                            <option value="Bakproducten">Bakproducten</option>
                            <option value="Ontbijt & Broodbeleg">Ontbijt & Broodbeleg</option>
                            <option value="Dranken">Dranken</option>
                            <option value="Diepvries">Diepvries</option>
                            <option value="Snoep & Koek">Snoep & Koek</option>
                            <option value="Noten & Gedroogd fruit">Noten & Gedroogd fruit</option>
                            <option value="Overig">Overig</option>
                        </select>
                    </div>
                    <div class="col-span-1 flex items-center justify-center">
                        <button type="button" onclick="this.closest('.grid').remove()"
                                class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
                    </div>
                </div>
            </div>

            <button type="button" onclick="addIngredientRow()"
                    class="mt-4 text-blue-500 hover:text-blue-700 text-sm">
                + Ingrediënt toevoegen
            </button>
        </div>

        <div class="flex justify-end space-x-4">
            <a href="{{ url_for('recipes') }}"
               class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                Annuleren
            </a>
            <button type="submit"
                    class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Opslaan
            </button>
        </div>
    </form>
</div>

<script>
const categories = {{ categories | tojson }};

function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addIngredientRow(name, amount, unit, category) {
    const container = document.getElementById('ingredients');
    const row = document.createElement('div');
    row.className = 'grid grid-cols-12 gap-2';
    const optionsHtml = categories.map(cat => `<option value="${esc(cat)}">${esc(cat)}</option>`).join('');
    row.innerHTML = `
        <div class="col-span-4">
            <input type="text" name="ingredient[]" placeholder="Ingrediënt" value="${esc(name)}"
                   class="block w-full rounded-md border-gray-300 shadow-sm">
        </div>
        <div class="col-span-2">
            <input type="number" step="0.1" name="amount[]" placeholder="Aantal" value="${esc(amount ?? '')}"
                   class="block w-full rounded-md border-gray-300 shadow-sm">
        </div>
        <div class="col-span-2">
            <input type="text" name="unit[]" placeholder="Eenheid" value="${esc(unit)}"
                   class="block w-full rounded-md border-gray-300 shadow-sm">
        </div>
        <div class="col-span-3">
            <select name="category[]" class="block w-full rounded-md border-gray-300 shadow-sm">
                ${optionsHtml}
            </select>
        </div>
        <div class="col-span-1 flex items-center justify-center">
            <button type="button" onclick="this.closest('.grid').remove()"
                    class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
        </div>
    `;
    if (category) {
        row.querySelector('select[name="category[]"]').value = category;
    }
    container.appendChild(row);
}

async function importFromUrl() {
    const url = document.getElementById('importUrl').value.trim();
    if (!url) return;

    const btn = document.getElementById('importBtn');
    const statusDiv = document.getElementById('importStatus');
    btn.disabled = true;
    btn.textContent = 'Bezig...';
    statusDiv.className = 'mt-2 text-sm text-gray-500';
    statusDiv.textContent = 'Recept ophalen...';
    statusDiv.classList.remove('hidden');

    try {
        const response = await fetch('/recipe/scrape', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        const data = await response.json();

        if (data.status !== 'success') {
            statusDiv.className = 'mt-2 text-sm text-red-600';
            statusDiv.textContent = 'Fout: ' + data.message;
            return;
        }

        if (data.name)         document.getElementById('fieldName').value = data.name;
        if (data.serves)       document.getElementById('fieldServes').value = data.serves;
        if (data.url)          document.getElementById('fieldUrl').value = data.url;
        if (data.instructions) document.getElementById('fieldInstructions').value = data.instructions;

        const preview = document.getElementById('importedImagePreview');
        const pathField = document.getElementById('fieldImagePath');
        if (data.image_path) {
            pathField.value = data.image_path;
            preview.src = '/' + data.image_path;
            preview.classList.remove('hidden');
        } else {
            pathField.value = '';
            preview.classList.add('hidden');
        }

        if (data.ingredients && data.ingredients.length > 0) {
            document.getElementById('ingredients').innerHTML = '';
            data.ingredients.forEach(ing => addIngredientRow(ing.name, ing.amount, ing.unit, ing.category));
        }

        statusDiv.className = 'mt-2 text-sm text-green-700';
        statusDiv.textContent = `Geïmporteerd: ${data.ingredients.length} ingrediënten. Controleer de velden en sla op.`;
    } catch (error) {
        statusDiv.className = 'mt-2 text-sm text-red-600';
        statusDiv.textContent = 'Fout: ' + error.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Importeren';
    }
}
</script>
{% endblock %}

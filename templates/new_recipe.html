{% extends "base.html" %}
{% block content %}
<div class="bg-[#F5F2ED] rounded-lg border border-[#E8E4DC] p-6">
    <h2 class="text-2xl font-extrabold tracking-tight text-[#2C2C2C] mb-6">Nieuw Recept</h2>

    <!-- Import opties: Foto / URL -->
    <div class="bg-[#FAF8F5] border border-[#E8E4DC] rounded-lg p-4 mb-6">
        <div class="flex gap-3 mb-4">
            <button type="button" onclick="showImportMode('photo')" id="tabPhoto"
                    class="flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#8B4513] bg-[#8B4513] text-white">
                Foto van kookboek
            </button>
            <button type="button" onclick="showImportMode('url')" id="tabUrl"
                    class="flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#D4CEC4] text-[#6B6B6B] hover:border-[#8B4513]">
                Importeer via URL
            </button>
        </div>

        <!-- Foto import -->
        <div id="importPhoto" class="space-y-3">
            <div>
                <input type="file" id="photoInput" accept="image/*" multiple capture="environment"
                       class="hidden" onchange="handlePhotoSelect(this)">
                <button type="button" onclick="document.getElementById('photoInput').click()"
                        id="photoSelectBtn"
                        class="w-full py-3 border-2 border-dashed border-[#D4CEC4] rounded-lg text-[#6B6B6B] hover:border-[#8B4513] hover:text-[#8B4513] text-sm">
                    Kies foto's (max 3)
                </button>
            </div>
            <div id="photoPreview" class="hidden grid grid-cols-3 gap-2"></div>
            <button type="button" onclick="importFromPhoto()" id="photoImportBtn"
                    class="hidden w-full bg-[#2C2C2C] text-white px-4 py-2 rounded hover:bg-[#1a1a1a] text-sm">
                Lees recept
            </button>
            <div id="photoStatus" class="hidden text-sm"></div>
        </div>

        <!-- URL import -->
        <div id="importUrl" class="hidden">
            <div class="flex gap-2">
                <input type="url" id="importUrlInput" placeholder="https://..."
                       class="flex-1 rounded-md border-[#D4CEC4] shadow-sm text-sm">
                <button type="button" onclick="importFromUrl()"
                        id="importBtn"
                        class="bg-[#2C2C2C] text-white px-4 py-2 rounded hover:bg-[#1a1a1a] text-sm shrink-0">
                    Importeren
                </button>
            </div>
            <div id="importStatus" class="hidden mt-2 text-sm"></div>
        </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Naam</label>
            <input type="text" name="name" id="fieldName" required
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Standaard aantal personen</label>
            <input type="number" name="serves" id="fieldServes" min="1" max="12"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
            <p class="text-[#6B6B6B] text-xs mt-1">Standaard aantal personen waarvoor dit recept is bedoeld (optioneel)</p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Kookboek</label>
            <select name="cookbook" id="fieldCookbook"
                    class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
                <option value="">Selecteer een kookboek</option>
                {% for cookbook in cookbooks %}
                <option value="{{ cookbook.id }}">{{ cookbook.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Receptafbeelding</label>
            <input type="file" name="image" accept="image/*"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
            <input type="hidden" name="image_path_imported" id="fieldImagePath">
            <img id="importedImagePreview" src="" alt="Geïmporteerde afbeelding"
                 class="hidden mt-2 rounded max-h-40 object-cover">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Pagina</label>
            <input type="number" name="page"
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">URL (online recept)</label>
            <input type="url" name="url" id="fieldUrl" placeholder="https://..."
                   class="mt-1 block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>

        <div>
            <label class="block text-sm font-semibold text-[#2C2C2C]">Bereidingswijze</label>
            <div id="quill-editor" class="mt-1 bg-white rounded-md" style="min-height:160px;"></div>
            <textarea name="instructions" id="fieldInstructions" class="hidden"></textarea>
        </div>

        <datalist id="unit-list">
            <option value="stuks"><option value="gram"><option value="g"><option value="kg">
            <option value="ml"><option value="dl"><option value="l"><option value="el"><option value="tl">
            <option value="blik"><option value="bosje"><option value="teen"><option value="snufje">
            <option value="scheutje"><option value="plak"><option value="takje"><option value="pakje">
        </datalist>

        <div>
            <h3 class="text-sm font-semibold uppercase tracking-wide text-[#6B6B6B] mb-2">Ingrediënten</h3>
            <div id="ingredients" class="space-y-2">
                <div class="grid grid-cols-12 gap-2 ingredient-row">
                    <div class="col-span-4 relative">
                        <input type="text" name="ingredient[]" placeholder="Ingrediënt" autocomplete="off"
                               class="ingredient-ac block w-full rounded-md border-[#D4CEC4] shadow-sm">
                        <input type="hidden" name="ingredient_id[]" value="">
                        <input type="text" name="preparation[]" placeholder="Bereiding (optioneel)"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm text-xs mt-1 py-1 text-[#6B6B6B]">
                        <div class="ac-dropdown hidden absolute z-50 w-full bg-white border border-[#E8E4DC] rounded-md shadow-lg mt-1 max-h-48 overflow-y-auto"></div>
                    </div>
                    <div class="col-span-2">
                        <input type="number" step="0.1" name="amount[]" placeholder="Aantal"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                    </div>
                    <div class="col-span-2">
                        <input type="text" name="unit[]" placeholder="Eenheid" list="unit-list"
                               class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                    </div>
                    <div class="col-span-3">
                        <select name="category[]" class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-span-1 flex items-center justify-center">
                        <button type="button" onclick="this.closest('.ingredient-row').remove()"
                                class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
                    </div>
                </div>
            </div>

            <button type="button" onclick="addIngredientRow()"
                    class="mt-4 text-[#8B4513] hover:text-[#8B4513] text-sm">
                + Ingrediënt toevoegen
            </button>
        </div>

        <div class="flex justify-end space-x-4">
            <a href="{{ url_for('recipes.receptenplanner') }}"
               class="border border-[#D4CEC4] text-[#2C2C2C] px-4 py-2 rounded hover:bg-[#F5F2ED]">
                Annuleren
            </a>
            <button type="submit"
                    class="bg-[#2C2C2C] text-white px-4 py-2 rounded hover:bg-[#2C2C2C]">
                Opslaan
            </button>
        </div>
    </form>
</div>

<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/ingredient-autocomplete.js') }}"></script>
<script>
const quill = new Quill('#quill-editor', {
  modules: {
    toolbar: [
      [{ 'header': [1, 2, false] }],
      ['bold', 'italic'],
      [{ 'list': 'ordered' }, { 'list': 'bullet' }],
      [{ 'color': [] }],
      ['clean']
    ]
  },
  theme: 'snow',
  placeholder: 'Beschrijf de bereidingsstappen...'
});

// Sync Quill content to hidden textarea on form submit
document.querySelector('form').addEventListener('submit', function() {
  document.getElementById('fieldInstructions').value = quill.root.innerHTML;
});

const categories = {{ categories | tojson }};

function addIngredientRow(name, amount, unit, category, ingId, preparation) {
    const container = document.getElementById('ingredients');
    const row = document.createElement('div');
    row.className = 'grid grid-cols-12 gap-2 ingredient-row';
    const optionsHtml = categories.map(cat => `<option value="${esc(cat)}">${esc(cat)}</option>`).join('');
    row.innerHTML = `
        <div class="col-span-4 relative">
            <input type="text" name="ingredient[]" placeholder="Ingrediënt" value="${esc(name)}" autocomplete="off"
                   class="ingredient-ac block w-full rounded-md border-[#D4CEC4] shadow-sm">
            <input type="hidden" name="ingredient_id[]" value="${esc(ingId ?? '')}">
            <input type="text" name="preparation[]" placeholder="Bereiding (optioneel)" value="${esc(preparation ?? '')}"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm text-xs mt-1 py-1 text-[#6B6B6B]">
            <div class="ac-dropdown hidden absolute z-50 w-full bg-white border border-[#E8E4DC] rounded-md shadow-lg mt-1 max-h-48 overflow-y-auto"></div>
        </div>
        <div class="col-span-2">
            <input type="number" step="0.1" name="amount[]" placeholder="Aantal" value="${esc(amount ?? '')}"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        <div class="col-span-2">
            <input type="text" name="unit[]" placeholder="Eenheid" value="${esc(unit ?? '')}" list="unit-list"
                   class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
        </div>
        <div class="col-span-3">
            <select name="category[]" class="block w-full rounded-md border-[#D4CEC4] shadow-sm">
                ${optionsHtml}
            </select>
        </div>
        <div class="col-span-1 flex items-center justify-center">
            <button type="button" onclick="this.closest('.ingredient-row').remove()"
                    class="text-red-400 hover:text-red-600 text-xl leading-none font-bold">×</button>
        </div>
    `;
    if (category) {
        row.querySelector('select[name="category[]"]').value = category;
    }
    container.appendChild(row);
    initAutocomplete(row.querySelector('.ingredient-ac'));
}

/* ── Import mode switching ────────────────────────────────── */
function showImportMode(mode) {
    const photoTab = document.getElementById('tabPhoto');
    const urlTab = document.getElementById('tabUrl');
    const photoDiv = document.getElementById('importPhoto');
    const urlDiv = document.getElementById('importUrl');

    if (mode === 'photo') {
        photoTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#8B4513] bg-[#8B4513] text-white';
        urlTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#D4CEC4] text-[#6B6B6B] hover:border-[#8B4513]';
        photoDiv.classList.remove('hidden');
        urlDiv.classList.add('hidden');
    } else {
        urlTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#8B4513] bg-[#8B4513] text-white';
        photoTab.className = 'flex-1 py-2 px-4 rounded-lg text-sm font-medium border-2 border-[#D4CEC4] text-[#6B6B6B] hover:border-[#8B4513]';
        urlDiv.classList.remove('hidden');
        photoDiv.classList.add('hidden');
    }
}

/* ── Photo import ────────────────────────────────────────── */
let selectedPhotos = [];

function handlePhotoSelect(input) {
    const files = Array.from(input.files).slice(0, 3);
    selectedPhotos = files;

    const preview = document.getElementById('photoPreview');
    const importBtn = document.getElementById('photoImportBtn');

    if (files.length === 0) {
        preview.classList.add('hidden');
        importBtn.classList.add('hidden');
        return;
    }

    preview.innerHTML = '';
    files.forEach((file, i) => {
        const div = document.createElement('div');
        div.className = 'relative';
        const img = document.createElement('img');
        img.className = 'w-full h-24 object-cover rounded';
        img.src = URL.createObjectURL(file);
        const badge = document.createElement('span');
        badge.className = 'absolute top-1 left-1 bg-black/50 text-white text-xs px-1.5 py-0.5 rounded';
        badge.textContent = i + 1;
        div.appendChild(img);
        div.appendChild(badge);
        preview.appendChild(div);
    });

    preview.classList.remove('hidden');
    importBtn.classList.remove('hidden');
}

async function importFromPhoto() {
    if (selectedPhotos.length === 0) return;

    const btn = document.getElementById('photoImportBtn');
    const statusDiv = document.getElementById('photoStatus');

    btn.disabled = true;
    btn.textContent = 'Bezig met lezen...';
    statusDiv.className = 'text-sm text-[#6B6B6B]';
    statusDiv.textContent = 'Recept wordt herkend...';
    statusDiv.classList.remove('hidden');

    const formData = new FormData();
    selectedPhotos.forEach(file => formData.append('photos', file));

    try {
        const response = await fetch('/recipe/from-photo', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();

        if (data.status !== 'success') {
            statusDiv.className = 'text-sm text-red-600';
            statusDiv.textContent = 'Fout: ' + data.message;
            return;
        }

        // Pre-fill formulier (zelfde als URL import)
        if (data.name) document.getElementById('fieldName').value = data.name;
        if (data.serves) document.getElementById('fieldServes').value = data.serves;
        if (data.instructions) quill.root.innerHTML = data.instructions;

        const preview = document.getElementById('importedImagePreview');
        const pathField = document.getElementById('fieldImagePath');
        if (data.image_path) {
            pathField.value = data.image_path;
            preview.src = '/' + data.image_path;
            preview.classList.remove('hidden');
        }

        if (data.ingredients && data.ingredients.length > 0) {
            document.getElementById('ingredients').innerHTML = '';
            data.ingredients.forEach(ing => addIngredientRow(ing.name, ing.amount, ing.unit, ing.category));
        }

        statusDiv.className = 'text-sm text-[#8B4513]';
        statusDiv.textContent = `Herkend: ${data.ingredients?.length || 0} ingrediënten. Controleer en sla op.`;

    } catch (error) {
        statusDiv.className = 'text-sm text-red-600';
        statusDiv.textContent = 'Fout: ' + error.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Lees recept';
    }
}

/* ── Check Gemini API status on load ─────────────────────── */
(async function() {
    try {
        const resp = await fetch('/api/gemini/status');
        const data = await resp.json();
        if (!data.configured) {
            const btn = document.getElementById('photoSelectBtn');
            btn.disabled = true;
            btn.textContent = 'Foto import niet beschikbaar (API key ontbreekt)';
            btn.className = 'w-full py-3 border-2 border-dashed border-[#E8E4DC] rounded-lg text-[#9CA3AF] cursor-not-allowed text-sm';
        }
    } catch (e) {}
})();

/* ── URL Import ──────────────────────────────────────────── */
async function importFromUrl() {
    const url = document.getElementById('importUrlInput').value.trim();
    if (!url) return;

    const btn = document.getElementById('importBtn');
    const statusDiv = document.getElementById('importStatus');
    btn.disabled = true;
    btn.textContent = 'Bezig...';
    statusDiv.className = 'mt-2 text-sm text-[#6B6B6B]';
    statusDiv.textContent = 'Recept ophalen...';
    statusDiv.classList.remove('hidden');

    try {
        const response = await fetch('/recipe/scrape', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        const data = await response.json();

        if (data.status !== 'success') {
            statusDiv.className = 'mt-2 text-sm text-red-600';
            statusDiv.textContent = 'Fout: ' + data.message;
            return;
        }

        if (data.name)         document.getElementById('fieldName').value = data.name;
        if (data.serves)       document.getElementById('fieldServes').value = data.serves;
        if (data.url)          document.getElementById('fieldUrl').value = data.url;
        if (data.instructions) quill.root.innerHTML = data.instructions;

        if (data.cookbook_id) {
            const sel = document.getElementById('fieldCookbook');
            if (!sel.querySelector(`option[value="${data.cookbook_id}"]`)) {
                const opt = document.createElement('option');
                opt.value = data.cookbook_id;
                opt.textContent = data.cookbook_name || '';
                sel.appendChild(opt);
            }
            sel.value = data.cookbook_id;
        }

        const preview = document.getElementById('importedImagePreview');
        const pathField = document.getElementById('fieldImagePath');
        if (data.image_path) {
            pathField.value = data.image_path;
            preview.src = '/' + data.image_path;
            preview.classList.remove('hidden');
        } else {
            pathField.value = '';
            preview.classList.add('hidden');
        }

        if (data.ingredients && data.ingredients.length > 0) {
            document.getElementById('ingredients').innerHTML = '';
            data.ingredients.forEach(ing => addIngredientRow(ing.name, ing.amount, ing.unit, ing.category));
        }

        statusDiv.className = 'mt-2 text-sm text-[#8B4513]';
        statusDiv.textContent = `Geïmporteerd: ${data.ingredients.length} ingrediënten. Controleer de velden en sla op.`;
    } catch (error) {
        statusDiv.className = 'mt-2 text-sm text-red-600';
        statusDiv.textContent = 'Fout: ' + error.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Importeren';
    }
}
</script>
{% endblock %}
